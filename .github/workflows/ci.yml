name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Suite-wide secret-scan gate, one normative source (kontourai/.github).
  secret-scan:
    name: Secret Scan
    uses: kontourai/.github/.github/workflows/secret-scan.yml@main
    permissions:
      contents: read

  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install
        run: npm ci --no-fund --no-audit

      - name: Verify
        run: npm run verify

      - name: Test
        run: npm test

      - name: Coverage Gate
        run: npm run test:coverage:check

  docs-browser:
    name: Docs browser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --no-fund --no-audit

      - name: Build Pages Source
        run: npm run docs:pages:build

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .site-src
          destination: .site-dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser test rendered docs
        run: npm run docs:pages:test:browser
