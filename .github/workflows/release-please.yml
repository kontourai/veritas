name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Release PRs authored by the default GITHUB_TOKEN (github-actions[bot])
      # get their CI runs held as action_required on every refresh. Minting a
      # token from the org's kontour-release-bot app makes the app the PR
      # author, so CI runs unassisted. See kontourai/flow-agents#38.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Tags created with GITHUB_TOKEN do not trigger tag-push workflows, so
      # dispatch the existing publish pipeline at the new tag explicitly.
      - name: Dispatch publish workflow
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-npm.yml --repo "$GITHUB_REPOSITORY" --ref "${{ steps.release.outputs.tag_name }}"
