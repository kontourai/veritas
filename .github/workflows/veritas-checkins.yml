name: Veritas Check-ins

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 15 * * 1'

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      health_status: ${{ steps.checkin.outputs.health_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --no-fund --no-audit

      - name: Run Veritas Proof Lane
        run: npm run veritas:proof

      - name: Refresh Committed Check-in Examples
        run: npm run veritas:checkin:examples

      - name: Generate Veritas Check-in
        env:
          VERITAS_CHANGED_FROM: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          VERITAS_CHANGED_TO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
        run: node scripts/checkin-status.mjs

      - name: Expose Check-in Outputs
        id: checkin
        run: |
          node <<'EOF'
          const { appendFileSync, readFileSync } = require('node:fs');
          const checkin = JSON.parse(readFileSync('.veritas/checkins/latest.json', 'utf8'));
          const outputPath = process.env.GITHUB_OUTPUT;
          const sanitize = (value) => String(value ?? '').replace(/\r?\n/g, ' ');
          const outputs = {
            run_id: checkin.run_id,
            health_status: checkin.health_status,
            alerts_count: checkin.alerts.length,
            report_artifact_path: checkin.report_artifact_path,
            eval_draft_artifact_path: checkin.eval_draft_artifact_path,
          };
          for (const [key, value] of Object.entries(outputs)) {
            appendFileSync(outputPath, `${key}=${sanitize(value)}\n`);
          }
          EOF

      - name: Upload Veritas Check-in Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veritas-checkins-${{ github.run_id }}
          path: |
            .veritas/evidence/
            .veritas/eval-drafts/
            .veritas/evals/
            .veritas/checkins/
            examples/checkins/

  update-pr-comment:
    if: always() && github.event_name == 'pull_request' && needs.checkin.result == 'success'
    needs: checkin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download Veritas Check-in Artifacts
        uses: actions/download-artifact@v4
        with:
          name: veritas-checkins-${{ github.run_id }}

      - name: Update PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const body = fs.readFileSync('.veritas/checkins/latest.md', 'utf8');
            const marker = '<!-- veritas-checkin-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const commentBody = `${marker}\n${body}\n### Links\n- [Workflow run](${runUrl})\n`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }

  update-health-issue:
    if: always() && github.event_name != 'pull_request' && needs.checkin.result == 'success'
    needs: checkin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download Veritas Check-in Artifacts
        uses: actions/download-artifact@v4
        with:
          name: veritas-checkins-${{ github.run_id }}

      - name: Update Health Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const checkin = JSON.parse(fs.readFileSync('.veritas/checkins/latest.json', 'utf8'));
            const body = fs.readFileSync('.veritas/checkins/latest.md', 'utf8');
            const title = 'Veritas Health';
            const marker = '<!-- veritas-health -->';
            const legacyTitle = 'Veritas Dogfood Health';
            const legacyMarker = '<!-- veritas-dogfood-health -->';
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const issueBody = `${marker}\n${body}\n### Links\n- [Workflow run](${runUrl})\n`;
            const healthLabel = 'veritas-health';
            const activeLabel = 'health:active';
            const clearLabel = 'health:green';

            for (const [name, color, description] of [
              [healthLabel, '1d76db', 'Veritas operational health tracking'],
              [activeLabel, 'd73a4a', 'Veritas health needs attention'],
              [clearLabel, '0e8a16', 'Veritas health currently green'],
            ]) {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }

            const allIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });
            const existing = allIssues.find((issue) =>
              issue.title === title ||
              issue.title === legacyTitle ||
              issue.body?.includes(marker) ||
              issue.body?.includes(legacyMarker),
            );

            if (checkin.health_status === 'green') {
              if (existing) {
                if (existing.state === 'open') {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: existing.number,
                    body: `Health returned to green in \`${checkin.run_id}\`.\n\n${body}`,
                  });
                }
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  title,
                  body: issueBody,
                  state: 'closed',
                });
                await github.rest.issues.setLabels({
                  owner,
                  repo,
                  issue_number: existing.number,
                  labels: [healthLabel, clearLabel],
                });
              }
              return;
            }

            if (existing && existing.state === 'open') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body: issueBody,
              });
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: existing.number,
                labels: [healthLabel, activeLabel],
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Automated Veritas check-in \`${checkin.run_id}\` reported **${checkin.health_status}** health.`,
              });
            } else if (existing && existing.state === 'closed') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                state: 'open',
                body: issueBody,
              });
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: existing.number,
                labels: [healthLabel, activeLabel],
              });
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: issueBody,
              });
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: created.data.number,
                labels: [healthLabel, activeLabel],
              });
            }

  fail-on-red-health:
    if: always() && needs.checkin.result == 'success' && needs.checkin.outputs.health_status == 'red'
    needs:
      - checkin
      - update-pr-comment
      - update-health-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fail On Red Health
        run: |
          echo "Veritas check-in health is red; see .veritas/checkins/latest.md and uploaded artifacts."
          exit 1
