name: Publish NPM

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install
        run: npm ci --no-fund --no-audit

      - name: Verify
        run: npm run verify

      - name: Test
        run: npm test

      - name: Coverage Gate
        run: npm run test:coverage:check

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install
        run: npm ci --no-fund --no-audit

      - name: Verify Tag Matches Package Version
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ \"v${PACKAGE_VERSION}\" != \"${GITHUB_REF_NAME}\" ]; then
            echo \"Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}\" >&2
            exit 1
          fi

      - name: Verify Tagged Commit Is On Main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "FETCH_HEAD"; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from the fetched origin/main tip" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
